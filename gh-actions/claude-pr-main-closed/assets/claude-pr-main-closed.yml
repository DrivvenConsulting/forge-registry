name: Claude PR Main Closed

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run Claude managed agent session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          python3 <<'EOF'
          import anthropic
          import os
          import re

          token = os.environ.get("GH_PAT") or os.environ.get("GITHUB_TOKEN", "")
          repo_slug = os.environ["GITHUB_REPOSITORY"]

          repo_url = f"https://github.com/{repo_slug}"
          resource = {"type": "github_repository", "url": repo_url}
          if token:
              resource["authorization_token"] = token

          memory_store = {
            "type": "memory_store",
            "memory_store_id": "memstore_01SJhHHPxn3FtN28sTz67kLa",
            "access": "read_write",
            "instructions": "Look first at index.md in order to understand the folder structure and content organization"
          }
            
          resources = [resource, memory_store]

          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          pr_body = os.environ.get("PR_BODY", "") or ""
          pr_url = os.environ["PR_URL"]
          pr_author = os.environ["PR_AUTHOR"]
          pr_merged = os.environ["PR_MERGED"].lower() == "true"
          status = "merged" if pr_merged else "closed without merging"

          # Extract linked issue from PR body (Closes/Fixes/Resolves #N)
          issue_match = re.search(r'(?:closes|fixes|resolves)\s+#(\d+)', pr_body, re.IGNORECASE)
          linked_issue = issue_match.group(1) if issue_match else None
          issue_line = f"Linked issue: #{linked_issue}" if linked_issue else "Linked issue: none found"

          message = f"""A pull request targeting main has been {status}:

          PR #{pr_number}: {pr_title}
          URL: {pr_url}
          Author: {pr_author}
          Status: {status}
          {issue_line}

          Description:
          {pr_body}"""

          print(f"Mounting repo: {repo_url}")

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          session = client.beta.sessions.create(
              agent="agent_018iQq34gvqkmWMJ4DrSL5e8",
              environment_id="env_01LSust4r4VsAJ6Zkwk16zUZ",
              resources=resources,
              vault_ids=["vlt_011CaYnfcnzDqEVksZrhdT4a"],
          )
          print(f"Session created: {session.id}")

          client.beta.sessions.events.send(
              session.id,
              events=[{
                  "type": "user.message",
                  "content": [{"type": "text", "text": message}],
              }],
          )
          print(f"Notified agent for PR #{pr_number}, linked issue #{linked_issue}, session: {session.id}")
          EOF
