name: Claude Issue Implementer

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    timeout-minutes: 10
    uses: DrivvenConsulting/github-actions-templates/.github/workflows/claude-issue-implementer.yml@main
    secrets: inherit
