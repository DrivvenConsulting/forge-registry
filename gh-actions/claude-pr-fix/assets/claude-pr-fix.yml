name: Claude PR Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run Claude managed agent session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'EOF'
          import anthropic
          import os

          comment_body = os.environ["COMMENT_BODY"]
          pr_number = os.environ.get("PR_NUMBER", "")
          token = os.environ.get("GH_PAT") or os.environ.get("GITHUB_TOKEN", "")
          repo_slug = os.environ["GITHUB_REPOSITORY"]

          repo_url = f"https://github.com/{repo_slug}"
          resource = {"type": "github_repository", "url": repo_url}
          if token:
              resource["authorization_token"] = token

          memory_store = {
            "type": "memory_store",
            "memory_store_id": "memstore_01SJhHHPxn3FtN28sTz67kLa",
            "access": "read_write",
            "instructions": "Look first at index.md in order to understand the folder structure and content organization"
          }
            
          resources = [resource, memory_store]

          print(f"Mounting repo: {repo_url}")

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          session = client.beta.sessions.create(
              agent="agent_011CaorHFdRcxgJgGLGjJJea",
              environment_id="env_01LSust4r4VsAJ6Zkwk16zUZ",
              resources=resources,
              vault_ids=["vlt_011CaYnfcnzDqEVksZrhdT4a"],
          )
          print(f"Session created: {session.id}")

          pr_context = f"\n\nThis comment is from pull request #{pr_number} in this repository." if pr_number else ""
          message = comment_body + pr_context

          client.beta.sessions.events.send(
              session.id,
              events=[{
                  "type": "user.message",
                  "content": [{"type": "text", "text": message}],
              }],
          )
          print(f"Message sent to session: {session.id}")
          EOF
